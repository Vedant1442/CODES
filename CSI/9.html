<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid</title>

<style>
.grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
}

.box {
height: 100px;
background-color: lightgreen;
}
</style>

</head>
<body>

<h4>Grid Layout</h4>

<div class="grid">
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
</div>

</body>
</html>
