<!DOCTYPE html>
<html>
<body>

<script>
let a = 10;
let b = 5;

console.log("Sum:", a + b);
console.log("Difference:", a - b);
console.log("Product:", a * b);

if (a > b) {
  console.log("a is greater");
} else if (a < b) {
  console.log("a is smaller");
} else {
  console.log("Both are equal");
}
</script>

</body>
</html>
